<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#E94560;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#E94560;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#E94560" flood-opacity="0.4"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Glow accent top -->
  <rect x="0" y="0" width="1200" height="120" fill="url(#glow)"/>

  <!-- Decorative dots grid -->
  <g opacity="0.08">
    <circle cx="80" cy="60" r="2" fill="#E94560"/>
    <circle cx="160" cy="90" r="1.5" fill="#E94560"/>
    <circle cx="240" cy="50" r="2" fill="#E94560"/>
    <circle cx="320" cy="80" r="1.5" fill="#E94560"/>
    <circle cx="400" cy="60" r="2" fill="#E94560"/>
    <circle cx="800" cy="70" r="2" fill="#E94560"/>
    <circle cx="880" cy="100" r="1.5" fill="#E94560"/>
    <circle cx="960" cy="55" r="2" fill="#E94560"/>
    <circle cx="1040" cy="85" r="1.5" fill="#E94560"/>
    <circle cx="1120" cy="65" r="2" fill="#E94560"/>
    <circle cx="100" cy="240" r="1.5" fill="#E94560"/>
    <circle cx="300" cy="260" r="2" fill="#E94560"/>
    <circle cx="900" cy="250" r="1.5" fill="#E94560"/>
    <circle cx="1100" cy="270" r="2" fill="#E94560"/>
  </g>

  <!-- Agent Icon: Hexagonal ring with AI core -->
  <g transform="translate(120, 150)" filter="url(#shadow)">
    <!-- Outer hexagon -->
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35"
             fill="none" stroke="#E94560" stroke-width="3" opacity="0.6"/>
    <!-- Inner hexagon -->
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25"
             fill="none" stroke="#E94560" stroke-width="2" opacity="0.4"/>
    <!-- Agent core (AI synapse dot) -->
    <circle cx="0" cy="0" r="18" fill="url(#accent)" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.9"/>
    <!-- Neural lines -->
    <line x1="-20" y1="-35" x2="-12" y2="-20" stroke="#E94560" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="-35" x2="12" y2="-20" stroke="#E94560" stroke-width="1.5" opacity="0.5"/>
    <line x1="-20" y1="35" x2="-12" y2="20" stroke="#E94560" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="35" x2="12" y2="20" stroke="#E94560" stroke-width="1.5" opacity="0.5"/>
    <!-- Small connection nodes -->
    <circle cx="-20" cy="-35" r="2" fill="#E94560" opacity="0.6"/>
    <circle cx="20" cy="-35" r="2" fill="#E94560" opacity="0.6"/>
    <circle cx="-20" cy="35" r="2" fill="#E94560" opacity="0.6"/>
    <circle cx="20" cy="35" r="2" fill="#E94560" opacity="0.6"/>
  </g>

  <!-- ECO Logo Text -->
  <g filter="url(#glowFilter)">
    <!-- ECO -->
    <text x="220" y="155" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="88" font-weight="800" fill="#FFFFFF" letter-spacing="4">
      ECO
    </text>
    <!-- Tagline -->
    <text x="220" y="195" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" fill="#9CA3AF" letter-spacing="6">
      AGENT · GESTIÓN DE PROYECTOS
    </text>
  </g>

  <!-- Integration badge: Flow Project -->
  <g transform="translate(670, 150)">
    <rect x="-95" y="-30" width="190" height="60" rx="8" fill="none" stroke="#E94560" stroke-width="1.5" opacity="0.3"/>
    <rect x="-93" y="-28" width="186" height="56" rx="7" fill="#E94560" fill-opacity="0.08"/>

    <!-- FP icon -->
    <text x="0" y="-5" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800" fill="#E94560" text-anchor="middle" letter-spacing="1">
      FLOW
    </text>
    <text x="0" y="18" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF" text-anchor="middle" letter-spacing="3">
      PROJECT
    </text>
  </g>
</svg>
